# yaml-language-server: $schema=https://gh-dash.dev/schema.json
prSections:
    - title: Needs My Review
      filters: is:open review-requested:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
    - title: My Pull Requests
      filters: is:open author:@me
issuesSections:
    - title: My Issues
      filters: is:open author:@me
    - title: Assigned
      filters: is:open assignee:@me
    - title: Involved
      filters: is:open involves:@me -author:@me
notificationsSections:
    - title: All
      filters: ""
    - title: Created
      filters: reason:author
    - title: Participating
      filters: reason:participating
    - title: Mentioned
      filters: reason:mention
    - title: Review Requested
      filters: reason:review-requested
    - title: Assigned
      filters: reason:assign
    - title: Subscribed
      filters: reason:subscribed
    - title: Team Mentioned
      filters: reason:team-mention
repo:
    branchesRefetchIntervalSeconds: 30
    prsRefetchIntervalSeconds: 60
defaults:
    preview:
        open: true
        width: 0.45
    prsLimit: 20
    prApproveComment: LGTM
    issuesLimit: 20
    notificationsLimit: 20
    view: prs
    layout:
        prs:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 20
            author:
                width: 15
            authorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
            base:
                width: 15
                hidden: true
            lines:
                width: 15
        issues:
            updatedAt:
                width: 5
            createdAt:
                width: 5
            repo:
                width: 15
            creator:
                width: 10
            creatorIcon:
                hidden: false
            assignees:
                width: 20
                hidden: true
    refetchIntervalMinutes: 30
keybindings: {}
repoPaths: {}
theme:
    ui:
        sectionsShowCount: true
        table:
            showSeparator: true
            compact: false
    colors:
        text:
            primary: "#c5c9c5"
            secondary: "#c8c093"
            inverted: "#c5c9c5"
            faint: "#a6a69c"
            warning: "#c4746e"
            success: "#8a9a7b"
            actor: "#c8c093"
        background:
            selected: "#1c1f1b"
        border:
            primary: "#a6a69c"
            secondary: "#c8c093"
            faint: "#0d0c0c"
pager:
    diff: "delta"
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true

ui:
  sectionsShowCount: true
table:
  showSeparators: true
  compact: false
colors:
  text:
    primary: "#c5c9c5"
    secondary: "#c8c093"
    inverted: "#c5c9c5"
    faint: "#a6a69c"
    warning: "#c4746e"
    success: "#8a9a7b"
    actor: "#c8c093"
  background:
    selected: "#1c1f1b"
  border:
    primary: "#a6a69c"
    secondary: "#c8c093"
    faint: "#0d0c0c"
  inline:
    icons:
      newcontributor: "077"
      contributor: "075"
      collaborator: "178"
      member: "178"
      owner: "178"
      unknownrole: "178"
icons:
  inline:
    newcontributor: "󰎔"
    contributor: ""
    collaborator: ""
    member: ""
    owner: ""
    unknownrole: "󰭙"
